schema_version: 1

context:
  name: prek
  version: "0.4.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/j178/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 7e86ac3e6eb91c606c55ee0f992c80df889b3c9ec170185a185165e5f4dd1dad

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
      # aws-lc-sys (pulled in via reqwest/rustls) requires clang-cl to assemble
      # its ARM64 perlasm `.S` files on Windows; MSVC's cl.exe silently drops
      # them, producing a link error. Harmless no-op on other targets.
      # https://aws.github.io/aws-lc-rs/requirements/windows.html
      CC_aarch64_pc_windows_msvc: clang-cl
      AR_aarch64_pc_windows_msvc: llvm-lib
    content:
      - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path crates/prek
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - if: win and arm64
      then: clang # provides clang-cl, required by aws-lc-sys on win-arm64

tests:
  - script:
      - prek --help

about:
  homepage: https://prek.j178.dev
  summary: Better `pre-commit`, re-engineered in Rust
  repository: https://github.com/j178/prek
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
    - licenses/LICENSE.pre-commit.txt
    - licenses/LICENSE.identify.txt
    - crates/prek-pty/LICENSE

extra:
  recipe-maintainers:
    - weiji14
    - ocefpaf
